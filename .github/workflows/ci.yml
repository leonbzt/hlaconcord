name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q

  oracle:
    name: py-ard oracle gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (with oracle extra)
        run: pip install -e ".[dev,oracle]"
      - name: Fetch IPD-IMGT/HLA 3.55.0 (name/group files only)
        run: python -m hlaconcord.cli db update 3.55.0 --data-dir "$PWD/imgt"
      - name: Run the oracle gate
        env:
          HLACONCORD_IMGT_DIR: ${{ github.workspace }}/imgt/3.55.0
          HLACONCORD_IMGT_VERSION: "3550"
          HLACONCORD_ORACLE_SAMPLE: "3000"
        run: pytest tests/test_oracle.py -s
